    <script>
        // ==================== GLOBAL STATE ====================
        let currentSport = 'all';
        let dataStore = {
            nba: { allData: [], gameLogs: [], playerLogCache: new Map(), selectedStatTypes: new Set(), currentOddsType: 'standard', currentView: 'cards', searchTerm: '', uniqueGames: [], uniqueTeams: [], uniqueCallouts: [], uniqueBetTags: [], selectedGames: new Set(), selectedTeams: new Set(), selectedCallouts: new Set(), selectedBetTags: new Set(), selectedFav: new Set(['Yes','No']), selectedGameTypes: new Set(['High','Normal','Low']), selectedHotCold: new Set(['Hot','Cold','Neutral']), showSelectedOnly: false, contentSortColumn: 'Edge', contentSortDirection: 'desc' },
            wnba: { allData: [], gameLogs: [], playerLogCache: new Map(), selectedStatTypes: new Set(), currentOddsType: 'standard', currentView: 'cards', searchTerm: '', uniqueGames: [], uniqueTeams: [], uniqueCallouts: [], uniqueBetTags: [], selectedGames: new Set(), selectedTeams: new Set(), selectedCallouts: new Set(), selectedBetTags: new Set(), selectedFav: new Set(['Yes','No']), selectedGameTypes: new Set(['High','Normal','Low']), selectedHotCold: new Set(['Hot','Cold','Neutral']), showSelectedOnly: false, contentSortColumn: 'Edge', contentSortDirection: 'desc' },
            mlb: { allData: [], gameLogs: [], playerLogCache: new Map(), selectedStatTypes: new Set(), currentOddsType: 'standard', currentView: 'cards', searchTerm: '', uniqueGames: [], uniqueTeams: [], uniqueCallouts: [], uniqueBetTags: [], selectedGames: new Set(), selectedTeams: new Set(), selectedCallouts: new Set(), selectedBetTags: new Set(), selectedFav: new Set(['Yes','No']), selectedGameTypes: new Set(['High','Normal','Low']), selectedHotCold: new Set(['Hot','Cold','Neutral']), showSelectedOnly: false, contentSortColumn: 'Edge', contentSortDirection: 'desc' }
        };
        let selectedBets = []; // SHARED across all sports
        let currentFiltered = [];
        let currentChart = null;
        let currentRowIndex = 0;
        let betSlipsSortColumn = 'Edge';
        let betSlipsSortDirection = 'desc';
        let selectedPayout = 'all';

        const contentDiv = document.getElementById('content');
        const searchInput = document.getElementById('search');
        const selectedToggle = document.getElementById('selectedToggle');
        const oddsSelect = document.getElementById('oddsSelect');
        const viewSelect = document.getElementById('viewSelect');
        const oddsToggle = document.getElementById('oddsToggle');
        const tabsDiv = document.getElementById('tabs');

        // ==================== UTILS ====================
        function normalizeName(name) {
            if (!name) return '';
            let n = name.toLowerCase()
                .replace(/[^a-z0-9\s]/g, ' ')           // keep spaces
                .replace(/\s+/g, ' ')
                .trim();

            // Common name normalizations (from original single-sport tools)
            n = n.replace(/\bjr\b/g, '')
                 .replace(/\bsr\b/g, '')
                 .replace(/\biii\b/g, '')
                 .replace(/\bii\b/g, '')
                 .replace(/\s+/g, '');

            return n;
        }

        function nameMatches(logName, playerName) {
            const n1 = normalizeName(logName);
            const n2 = normalizeName(playerName);
            if (!n1 || !n2) return false;
            if (n1 === n2) return true;
            if (n1.includes(n2) || n2.includes(n1)) return true;

            // Extra fuzzy: last name match if first names are close
            const parts1 = logName.toLowerCase().split(/\s+/);
            const parts2 = playerName.toLowerCase().split(/\s+/);
            if (parts1.length > 1 && parts2.length > 1) {
                const last1 = parts1[parts1.length - 1].replace(/[^a-z]/g, '');
                const last2 = parts2[parts2.length - 1].replace(/[^a-z]/g, '');
                if (last1 && last2 && last1 === last2) return true;
            }
            return false;
        }
        function getStatValue(log, statType, sport = 'nba') {
            const s = (statType || '').toLowerCase();
            if (sport === 'mlb') {
                const lowerStat = s;

                if (lowerStat.includes('fantasy score')) {
                    return calculateFantasyScore(log, sport);
                }

                const isPitcher = (log.position || '').toUpperCase().includes('P') || 
                                  lowerStat.includes('pitcher') || lowerStat.includes('ip') || lowerStat.includes('er') || 
                                  lowerStat.includes('strikeout') || lowerStat.includes('earned run');

                if (isPitcher) {
                    if (lowerStat.includes('innings') || lowerStat.includes('ip')) return parseFloat(log.inningsPitched || log.IP || 0);
                    if (lowerStat.includes('earned') || lowerStat.includes('er')) return parseFloat(log.earnedRuns || log.ER || 0);
                    if (lowerStat.includes('strikeout') || lowerStat.includes('k') || lowerStat.includes('so')) return parseFloat(log.strikeOutsPitching || log.strikeOuts || log.K || 0);
                    if (lowerStat.includes('walk') || lowerStat.includes('bb')) return parseFloat(log.baseOnBallsPitching || log.BB || 0);
                    if (lowerStat.includes('hit') && !lowerStat.includes('hit by')) return parseFloat(log.hitsAllowed || log.H || 0);
                    if (lowerStat.includes('fantasy')) return calculateFantasyScore(log, sport);
                    if (lowerStat.includes('h+r+rbi') || lowerStat.includes('hrrbi')) return (parseFloat(log.hits||0) + parseFloat(log.runs||0) + parseFloat(log.rbi||0));
                } else {
                    // Hitter logic
                    if (lowerStat.includes('hit') && !lowerStat.includes('hit by')) return parseFloat(log.hits || log.H || 0);
                    if (lowerStat.includes('home run') || lowerStat.includes('hr')) return parseFloat(log.homeRuns || log.HR || 0);
                    if (lowerStat.includes('rbi')) return parseFloat(log.rbi || log.RBI || 0);
                    if (lowerStat.includes('run') && !lowerStat.includes('rbi')) return parseFloat(log.runs || log.R || 0);
                    if (lowerStat.includes('ab') || lowerStat.includes('at bat')) return parseFloat(log.atBats || log.AB || 0);
                    if (lowerStat.includes('fantasy')) return calculateFantasyScore(log, sport);
                    if (lowerStat.includes('h+r+rbi') || lowerStat.includes('hrrbi') || lowerStat.includes('hits+runs+rbis')) {
                        return (parseFloat(log.hits||0) + parseFloat(log.runs||0) + parseFloat(log.rbi||0));
                    }
                    if (lowerStat.includes('walk') || lowerStat.includes('bb')) {
                        return parseFloat(log.baseOnBalls || log.BB || 0);
                    }
                }
                return 0;
            } else {
                // NBA / WNBA
                if (s.includes('point') && !s.includes('+')) return parseFloat(log.PTS || log.points || 0);
                if (s.includes('rebound') && !s.includes('+')) return parseFloat(log.REB || log.rebounds || 0);
                if (s.includes('assist') && !s.includes('+')) return parseFloat(log.AST || log.assists || 0);
                if (s.includes('3pt') || s.includes('3-pt') || s.includes('three')) {
                    if (s.includes('made') || s.includes('pm')) return parseFloat(log['3PM'] || log['3sPM'] || log.threePointersMade || 0);
                    if (s.includes('attempt')) return parseFloat(log['3PA'] || log.threePointersAttempted || 0);
                }
                if (s.includes('pts+rebs+asts') || s.includes('pra')) return parseFloat(log.PTS||0) + parseFloat(log.REB||0) + parseFloat(log.AST||0);
                if (s.includes('pts+rebs') || s.includes('pr')) return parseFloat(log.PTS||0) + parseFloat(log.REB||0);
                if (s.includes('pts+asts') || s.includes('pa')) return parseFloat(log.PTS||0) + parseFloat(log.AST||0);
                if (s.includes('rebs+asts') || s.includes('ra')) return parseFloat(log.REB||0) + parseFloat(log.AST||0);
                if (s.includes('fantasy') || s.includes('fp')) {
                    const pts = parseFloat(log.PTS || 0);
                    const reb = parseFloat(log.REB || 0);
                    const ast = parseFloat(log.AST || 0);
                    const stl = parseFloat(log.STL || 0);
                    const blk = parseFloat(log.BLK || 0);
                    const tov = parseFloat(log.TOV || 0);
                    return pts + reb * 1.2 + ast * 1.5 + stl * 3 + blk * 3 - tov * 1; // common DFS scoring
                }
                if (s.includes('steal')) return parseFloat(log.STL || 0);
                if (s.includes('block')) return parseFloat(log.BLK || 0);
                if (s.includes('turnover') || s.includes('tov')) return parseFloat(log.TOV || 0);
                if (s.includes('personal foul') || s.includes('pf')) return parseFloat(log.PF || 0);
                if (s.includes('fg made')) return parseFloat(log.FGM || 0);
                if (s.includes('fg attempt')) return parseFloat(log.FGA || 0);
                if (s.includes('free throw')) return parseFloat(log.FTM || 0);
                return parseFloat(log[s.toUpperCase()] || log[statType] || 0) || 0;
            }
        }

        function calculateFantasyScore(log, sport) {
            if (sport !== 'mlb') {
                const pts = parseFloat(log.PTS || log.points || 0);
                const reb = parseFloat(log.REB || log.rebounds || 0);
                const ast = parseFloat(log.AST || log.assists || 0);
                const stl = parseFloat(log.STL || 0);
                const blk = parseFloat(log.BLK || 0);
                const tov = parseFloat(log.TOV || 0);
                return pts + reb * 1.2 + ast * 1.5 + stl * 3 + blk * 3 - tov;
            }

            // MLB Fantasy Score calculation (from original MLB code)
            const isHitter = parseFloat(log.atBats || log.AB || 0) > 0;

            if (isHitter) {
                const singles = parseFloat(log.hits || log.H || 0) - parseFloat(log.doubles || 0) - parseFloat(log.triples || 0) - parseFloat(log.homeRuns || log.HR || 0);
                const doubles = parseFloat(log.doubles || 0);
                const triples = parseFloat(log.triples || 0);
                const hr = parseFloat(log.homeRuns || log.HR || 0);
                const runs = parseFloat(log.runs || log.R || 0);
                const rbi = parseFloat(log.rbi || log.RBI || 0);
                const bb = parseFloat(log.baseOnBalls || log.BB || 0);
                const hbp = parseFloat(log.hitByPitch || log.HBP || 0);
                const sb = parseFloat(log.stolenBases || log.SB || 0);
                return (singles * 3) + (doubles * 5) + (triples * 8) + (hr * 10) + (runs * 2) + (rbi * 2) + (bb * 2) + (hbp * 2) + (sb * 5);
            } else {
                // Pitcher
                const ip = parseFloat(log.inningsPitched || log.IP || 0);
                const outs = ip * 3;
                const er = parseFloat(log.earnedRuns || log.ER || 0);
                const k = parseFloat(log.strikeOutsPitching || log.strikeOuts || log.K || 0);
                const decision = (log.decision || log.Decision || log.note || '').toUpperCase();
                const win = decision.includes('W') ? 6 : 0;
                const qs = (ip >= 6 && er < 3) ? 4 : 0;
                return win + qs + outs + (k * 3) - (er * 3);
            }
        }

        // ==================== DATA LOADING & PREP ====================
        async function loadAllData() {
            contentDiv.innerHTML = '<div class="loading">Loading prop data...<br><span style="font-size:12px;color:#888;">Game logs will load when you open a player</span></div>';

            // ==================== GAME LOG CONFIG (Phase 2) ====================
            // Priority: Local data/ folder > Remote URL
            // For NBA game logs you are using Google Sheets — replace the nba.logs URL below with your published CSV link.
            // MLB is using GitHub raw (as currently in play).
            const urls = {
                nba: { 
                    pp: './data/prizepicks-nba.csv', 
                    logs: './data/nba_game_logs.csv'   // Local first (recommended). Change to your Google Sheets published CSV if preferred.
                },
                wnba: { 
                    pp: './data/prizepicks-wnba.csv', 
                    logs: './data/wnba_game_logs.csv' 
                },
                mlb: { 
                    pp: './data/prizepicks-mlb.csv', 
                    logs: 'https://raw.githubusercontent.com/925Sports/mlb-player-game-logs/main/mlb_2026_season_game_logs.csv' 
                }
            };

            try {
                const results = await Promise.allSettled([
                    fetch(urls.nba.pp).then(r => r.ok ? r.text() : Promise.reject('NBA CSV missing')),
                    fetch(urls.wnba.pp).then(r => r.ok ? r.text() : Promise.reject('WNBA CSV missing')),
                    fetch(urls.mlb.pp).then(r => r.ok ? r.text() : Promise.reject('MLB CSV missing'))
                ]);

                const [nbaRes, wnbaRes, mlbRes] = results;

                if (nbaRes.status === 'fulfilled') dataStore.nba.allData = Papa.parse(nbaRes.value, { header: true, skipEmptyLines: true }).data;
                if (wnbaRes.status === 'fulfilled') dataStore.wnba.allData = Papa.parse(wnbaRes.value, { header: true, skipEmptyLines: true }).data;
                if (mlbRes.status === 'fulfilled') dataStore.mlb.allData = Papa.parse(mlbRes.value, { header: true, skipEmptyLines: true }).data;

                // Ensure odds type defaults to Standard on load
                ['nba', 'wnba', 'mlb'].forEach(s => {
                    if (!dataStore[s].currentOddsType) dataStore[s].currentOddsType = 'standard';
                });

                // Prepare each sport
                ['nba', 'wnba', 'mlb'].forEach(sport => prepareSportData(sport));

                // Restore selectedBets from localStorage if any
                try {
                    const saved = localStorage.getItem('pp_selectedBets');
                    if (saved) selectedBets = JSON.parse(saved);
                } catch(e){}

                // Initial render
                currentSport = 'all';
                updateSportTabs();
                initCurrentSport();
                updateBetSlipCount();

                // Show welcome if no data
                const totalRows = dataStore.nba.allData.length + dataStore.wnba.allData.length + dataStore.mlb.allData.length;
                if (totalRows === 0) {
                    contentDiv.innerHTML = '<div class="loading" style="color:#f59e0b; max-width: 520px; margin: 40px auto; line-height: 1.5;">No prop data loaded.<br><br><strong>How to set up your data:</strong><br>1. Put the 3 prop CSVs in a <code>data/</code> folder<br>2. Refresh the page<br><br>Game logs now load on-demand when you open a player (much faster initial load).</div>';
                }

            } catch (err) {
                console.error(err);
                contentDiv.innerHTML = '<div class="loading" style="color:#ef4444;">Error loading data.<br>Check the browser console (F12) for details and make sure your CSV files are correctly placed in the data/ folder.</div>';
            }
        }

        function prepareSportData(sport) {
            const store = dataStore[sport];
            const data = store.allData || [];
            if (!data.length) return;

            // Unique values
            store.uniqueGames = [...new Set(data.map(r => r['Game Short Title'] || r.Game || '').filter(Boolean))].sort();
            store.uniqueTeams = [...new Set(data.map(r => r.Team || '').filter(Boolean))].sort();
            store.uniqueCallouts = [...new Set(data.map(r => (r['Callout Bet Tag'] || '').trim()).filter(Boolean))].sort();
            store.uniqueBetTags = [...new Set(data.map(r => (r['Bet Tag'] || '').trim()).filter(Boolean))].sort();

            // Init selections
            store.selectedGames = new Set(store.uniqueGames);
            store.selectedTeams = new Set(store.uniqueTeams);
            store.selectedCallouts = new Set(store.uniqueCallouts);
            store.selectedBetTags = new Set(store.uniqueBetTags);
            store.selectedFav = new Set(['Yes', 'No']);
            store.selectedGameTypes = new Set(['High', 'Normal', 'Low']);
            store.selectedHotCold = new Set(['Hot', 'Cold', 'Neutral']);

            // No heavy game log precomputation on initial load for speed.
            // L5 stats + game logs are now calculated on-demand when user opens a player popup.
            data.forEach(row => {
                row._sport = sport;
            });
        }

        // On-demand game log loader (key for fast initial load)
        async function ensureGameLogsLoaded(sport) {
            const store = dataStore[sport];
            if (store.gameLogs && store.gameLogs.length > 0) return; // already loaded

            // Try local first, then remote
            const localUrl = `./data/${sport}_game_logs.csv`;
            let gameLogText = '';

            try {
                const res = await fetch(localUrl);
                if (res.ok) {
                    gameLogText = await res.text();
                } else {
                    // Fallback to configured remote URL
                    const remoteUrl = (sport === 'mlb') 
                        ? 'https://raw.githubusercontent.com/925Sports/mlb-player-game-logs/refs/heads/main/mlb_2026_season_game_logs.csv'
                        : (sport === 'nba' 
                            ? 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR-ZvShRlEWJen3PKivCQF79zYZJkW04F00THnwUrD_xUPvq609FWXZaD6sf4SPJ9rBvTzzrusA8a3N/pub?gid=0&single=true&output=csv' 
                            : './data/wnba_game_logs.csv');
                    if (remoteUrl) {
                        const remoteRes = await fetch(remoteUrl);
                        if (remoteRes.ok) gameLogText = await remoteRes.text();
                    }
                }
            } catch (e) {
                console.warn(`Could not load game logs for ${sport}`, e);
            }

            if (gameLogText) {
                store.gameLogs = Papa.parse(gameLogText, { header: true, skipEmptyLines: true }).data;
                console.log(`Loaded ${store.gameLogs.length} game logs for ${sport}`);

                // Build fast lookup cache: normalized name -> array of logs
                store.playerLogCache = new Map();
                store.gameLogs.forEach(log => {
                    const rawName = log.PLAYER || log['Player Name'] || log.fullName || log['fullName'] || '';
                    const norm = normalizeName(rawName);
                    if (!norm) return;
                    if (!store.playerLogCache.has(norm)) store.playerLogCache.set(norm, []);
                    store.playerLogCache.get(norm).push(log);
                });
            }
        }

        function initCurrentSport() {
            // Hide advanced filters on "All" tab for better UX (customer-facing)
            const filterBtnEl = document.getElementById('filterBtn');
            const calloutFilterBtnEl = document.getElementById('calloutFilterBtn');
            if (currentSport === 'all') {
                if (filterBtnEl) filterBtnEl.style.display = 'none';
                if (calloutFilterBtnEl) calloutFilterBtnEl.style.display = 'none';
                // Build stat type tabs also for All (combined from all sports)
                buildStatTabs();
                renderAllView();
            } else {
                if (filterBtnEl) filterBtnEl.style.display = '';
                if (calloutFilterBtnEl) calloutFilterBtnEl.style.display = '';
                const store = dataStore[currentSport];
                if (!store || !store.allData.length) {
                    contentDiv.innerHTML = `<div class="loading">No ${currentSport.toUpperCase()} data loaded.</div>`;
                    return;
                }
                // Reset search & view for cleanliness
                searchInput.value = store.searchTerm || '';
                viewSelect.value = store.currentView;
                selectedToggle.checked = store.showSelectedOnly;

                // Rebuild stat type tabs
                buildStatTabs();

                // Render
                renderContent();
            }

            // Always attach listeners (safe to call multiple times)
            attachControlListeners();
        }

        function updateSportTabs() {
            document.querySelectorAll('.sport-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.sport === currentSport);
                btn.onclick = () => {
                    const newSport = btn.dataset.sport;
                    if (newSport === currentSport) return;
                    currentSport = newSport;
                    updateSportTabs();
                    initCurrentSport();
                };
            });
        }

        function buildStatTabs() {
            tabsDiv.innerHTML = '';

            const isAll = currentSport === 'all';
            let store, data;

            if (isAll) {
                // Combine data from all sports for stat type tabs on "All" view
                data = [];
                ['nba', 'wnba', 'mlb'].forEach(s => {
                    if (dataStore[s] && dataStore[s].allData) {
                        data = data.concat(dataStore[s].allData);
                    }
                });
                if (!window.allStatTypesSelected) window.allStatTypesSelected = new Set();
                store = { selectedStatTypes: window.allStatTypesSelected };
            } else {
                store = dataStore[currentSport];
                data = store.allData || [];
            }

            if (!data.length) return;

            let statTypes = [...new Set(data.map(r => (r['Stat Type'] || '').trim()).filter(Boolean))].sort();

            // Limit to most common for cleanliness
            if (statTypes.length > 14) statTypes = statTypes.slice(0, 14);

            // "All" button clears selection
            const allBtn = document.createElement('div');
            allBtn.className = `tab ${store.selectedStatTypes.size === 0 ? 'active' : ''}`;
            allBtn.textContent = 'All';
            allBtn.onclick = () => {
                store.selectedStatTypes.clear();
                document.querySelectorAll('#tabs .tab').forEach(t => t.classList.remove('active'));
                allBtn.classList.add('active');
                if (isAll) renderAllView(); else renderContent();
            };
            tabsDiv.appendChild(allBtn);

            statTypes.forEach(stat => {
                const btn = document.createElement('div');
                const isActive = store.selectedStatTypes.has(stat);
                btn.className = `tab ${isActive ? 'active' : ''}`;
                btn.textContent = stat;
                btn.onclick = () => {
                    if (store.selectedStatTypes.has(stat)) {
                        store.selectedStatTypes.delete(stat);
                        btn.classList.remove('active');
                    } else {
                        store.selectedStatTypes.add(stat);
                        btn.classList.add('active');
                    }
                    // Deactivate "All" if any specific is selected
                    const allTab = tabsDiv.querySelector('.tab');
                    if (allTab) allTab.classList.remove('active');
                    if (isAll) renderAllView(); else renderContent();
                };
                tabsDiv.appendChild(btn);
            });
        }

        function attachControlListeners() {
            // Search
            searchInput.oninput = () => {
                if (currentSport === 'all') {
                    renderAllView();
                } else {
                    dataStore[currentSport].searchTerm = searchInput.value.toLowerCase().trim();
                    renderContent();
                }
            };

            // View select - fully supports Table view on All tab
            viewSelect.onchange = () => {
                if (currentSport === 'all') {
                    renderAllView();
                } else {
                    dataStore[currentSport].currentView = viewSelect.value;
                    renderContent();
                }
            };

            // Selected only
            selectedToggle.onchange = () => {
                if (currentSport !== 'all') {
                    dataStore[currentSport].showSelectedOnly = selectedToggle.checked;
                    renderContent();
                }
            };

            // Odds type select (dropdown only now)
            oddsSelect.onchange = () => {
                if (currentSport === 'all') {
                    renderAllView();
                } else {
                    dataStore[currentSport].currentOddsType = oddsSelect.value;
                    renderContent();
                }
            };

            // Filter buttons
            document.getElementById('filterBtn').onclick = () => showFilterPopup();
            document.getElementById('calloutFilterBtn').onclick = () => showCalloutFilterPopup();
            document.getElementById('advancedFilterBtn').onclick = () => showAdvancedFilterPopup();
            document.getElementById('betslipBtn').onclick = () => showBetSlipPopup();

            // Clear Bets button (clears persisted selectedBets from localStorage)
            const clearBetsBtn = document.getElementById('clearBetsBtn');
            if (clearBetsBtn) {
                clearBetsBtn.onclick = () => {
                    selectedBets = [];
                    try { localStorage.removeItem('pp_selectedBets'); } catch(e){}
                    updateBetSlipCount();
                    if (currentSport === 'all') {
                        renderAllView();
                    } else {
                        renderContent();
                    }
                    // If bet slip popup is open, refresh it
                    const betSlipPopup = document.getElementById('betslipPopup');
                    if (betSlipPopup && betSlipPopup.style.display === 'block') {
                        renderBetSlipsTable();
                    }
                };
            }

            // Apply buttons for popups (defined in show functions)
        }

        // ==================== RENDER CONTENT ====================
        function renderContent() {
            if (currentSport === 'all') {
                renderAllView();
                return;
            }
            const store = dataStore[currentSport];
            contentDiv.innerHTML = '<div class="loading">Loading...</div>';

            setTimeout(async () => {
                // Ensure game logs are loaded for accurate L5/L20 stats in table view
                if (store.currentView === 'table') {
                    await ensureGameLogsLoaded(currentSport);
                }
                let filtered = store.allData.filter(row => (row['Stat Type'] || '').trim() !== '');

                // Multi-select Stat Type filter
                if (store.selectedStatTypes.size > 0) {
                    filtered = filtered.filter(row => store.selectedStatTypes.has((row['Stat Type'] || '').trim()));
                }

                // Odds type
                if (store.currentOddsType !== 'all') {
                    filtered = filtered.filter(row => (row['Odds Type'] || 'standard') === store.currentOddsType);
                }

                // Search
                if (store.searchTerm) {
                    const term = store.searchTerm;
                    filtered = filtered.filter(row =>
                        (row['Player Name'] || '').toLowerCase().includes(term) ||
                        (row['Stat Type'] || '').toLowerCase().includes(term) ||
                        (row.Team || '').toLowerCase().includes(term)
                    );
                }

                // Game / Team / Callout filters
                filtered = filtered.filter(row => {
                    const gameOk = store.selectedGames.has(row['Game Short Title'] || '');
                    const teamOk = store.selectedTeams.has(row.Team || '');
                    const calloutOk = !row['Callout Bet Tag'] || store.selectedCallouts.has((row['Callout Bet Tag'] || '').trim());
                    return gameOk && teamOk && calloutOk;
                });

                // Advanced filters
                if (store.selectedBetTags.size > 0) {
                    filtered = filtered.filter(row => store.selectedBetTags.has((row['Bet Tag'] || '').trim()));
                }
                if (store.selectedFav.size > 0) {
                    filtered = filtered.filter(row => store.selectedFav.has(row['Fav'] || 'No'));
                }
                if (store.selectedGameTypes.size > 0) {
                    filtered = filtered.filter(row => {
                        const ou = parseFloat(row['O/U'] || row['Over/Under'] || 0);
                        let type = 'Normal';
                        if (ou >= 9.6) type = 'High';
                        else if (ou <= 8.4) type = 'Low';
                        return store.selectedGameTypes.has(type);
                    });
                }
                if (store.selectedHotCold.size > 0) {
                    filtered = filtered.filter(row => {
                        const status = getHotColdStatus(row['Player Name'], currentSport);
                        return store.selectedHotCold.has(status);
                    });
                }

                if (store.showSelectedOnly) {
                    const selectedKeys = new Set(selectedBets.filter(b => b.sport === currentSport).map(b => b.key));
                    filtered = filtered.filter(row => selectedKeys.has(`${row['Player Name']}-${row['Stat Type']}`));
                }

                // Sort
                filtered.sort((a, b) => {
                    let aVal = parseFloat(a[store.contentSortColumn] || a['Edge %'] || 0);
                    let bVal = parseFloat(b[store.contentSortColumn] || b['Edge %'] || 0);
                    if (store.contentSortColumn === 'Edge') {
                        aVal = parseFloat(a['Edge %'] || 0);
                        bVal = parseFloat(b['Edge %'] || 0);
                    }
                    return store.contentSortDirection === 'asc' ? aVal - bVal : bVal - aVal;
                });

                currentFiltered = filtered;

                contentDiv.innerHTML = '';
                contentDiv.className = store.currentView === 'table' ? 'table-view' : '';

                if (filtered.length === 0) {
                    contentDiv.innerHTML = '<div class="loading">No data available for this selection.</div>';
                    return;
                }

                if (store.currentView === 'cards') {
                    filtered.forEach((row, index) => {
                        const card = createPlayerCard(row, index, currentSport);
                        contentDiv.appendChild(card);
                    });
                } else {
                    // Full Table view implementation
                    const table = document.createElement('table');
                    table.style.width = '100%';
                    table.style.borderCollapse = 'collapse';
                    table.style.fontSize = '13px';

                    const thead = document.createElement('thead');
                    const headerRow = document.createElement('tr');
                    const headers = [
                        { label: 'Player', key: null, sortable: false },
                        { label: 'Stat', key: null, sortable: false },
                        { label: 'Edge', key: 'Edge', sortable: true },
                        { label: 'Line', key: 'Line', sortable: true },
                        { label: 'PP - UD', key: 'PPUD', sortable: true },
                        { label: 'L5 Avg', key: 'L5Avg', sortable: true },
                        { label: 'L5 Hit%', key: 'L5Hit', sortable: true },
                        { label: 'L20 Avg', key: 'L20Avg', sortable: true },
                        { label: 'L20 Hit%', key: 'L20Hit', sortable: true },
                        { label: 'Actions', key: null, sortable: false }
                    ];

                    headers.forEach(h => {
                        const th = document.createElement('th');
                        if (h.label === 'Edge') {
                            th.innerHTML = `Edge <span class="edge-info-icon" style="cursor:pointer; color:#00ffcc; font-size:13px; margin-left:4px;">ℹ️</span>`;
                            th.style.padding = '10px 8px';
                            th.style.background = '#222';
                            th.style.color = '#ccc';
                            th.style.borderBottom = '2px solid #333';
                            th.style.position = 'sticky';
                            th.style.top = '0';

                            setTimeout(() => {
                                const infoIcon = th.querySelector('.edge-info-icon');
                                if (infoIcon) {
                                    infoIcon.onclick = (e) => {
                                        e.stopImmediatePropagation();
                                        showEdgeExplanationModal();
                                    };
                                }
                            }, 0);
                        } else {
                            th.textContent = h.label;
                            th.style.padding = '10px 8px';
                            th.style.background = '#222';
                            th.style.color = '#ccc';
                            th.style.borderBottom = '2px solid #333';
                            th.style.position = 'sticky';
                            th.style.top = '0';
                        }
                        if (h.sortable) {
                            th.style.cursor = 'pointer';
                            th.onclick = () => {
                                if (store.contentSortColumn === h.key) {
                                    store.contentSortDirection = store.contentSortDirection === 'asc' ? 'desc' : 'asc';
                                } else {
                                    store.contentSortColumn = h.key;
                                    store.contentSortDirection = h.key === 'Edge' ? 'desc' : 'asc';
                                }
                                renderContent();
                            };
                            if (store.contentSortColumn === h.key) {
                                th.classList.add(store.contentSortDirection);
                                th.style.color = '#00ffcc';
                            }
                        }
                        headerRow.appendChild(th);
                    });
                    thead.appendChild(headerRow);
                    table.appendChild(thead);

                    const tbody = document.createElement('tbody');

                    // Precompute L5 for table - FAST using cache
                    const storeForCache = dataStore[currentSport];
                    filtered.forEach(row => {
                        const playerName = row['Player Name'];
                        const normPlayer = normalizeName(playerName);
                        let playerLogs = storeForCache.playerLogCache?.get(normPlayer) || [];
                        if (playerLogs.length === 0 && storeForCache.gameLogs?.length) {
                            // Fallback (should rarely happen)
                            playerLogs = storeForCache.gameLogs.filter(log => 
                                nameMatches(log.fullName || log['fullName'] || log['Player Name'] || log.PLAYER || '', playerName)
                            );
                        }
                        playerLogs = [...playerLogs].sort((a, b) => new Date(b.gameDate || b['GAME DATE'] || b.date || 0) - new Date(a.gameDate || a['GAME DATE'] || a.date || 0));
                        const last5 = playerLogs.slice(0, 5);
                        const line = parseFloat(row['Line Score'] || row.Line || 0);
                        const betTag = (row['Bet Tag'] || '').toLowerCase();
                        const isMore = betTag.includes('more') || betTag.includes('over') || betTag.includes('↑');

                        let l5Avg = '-';
                        let l5Hit = '-';
                        let l20Avg = '-';
                        let l20Hit = '-';

                        if (last5.length > 0) {
                            let sum = 0;
                            let hits = 0;
                            last5.forEach(log => {
                                const val = getStatValue(log, row['Stat Type'] || '', currentSport);
                                sum += val;
                                if (isMore) {
                                    if (val > line) hits++;
                                } else {
                                    if (val < line) hits++;
                                }
                            });
                            l5Avg = (sum / last5.length).toFixed(1);
                            l5Hit = ((hits / last5.length) * 100).toFixed(0);
                        }

                        // L20 calculation
                        const last20 = playerLogs.slice(0, 20);
                        if (last20.length > 0) {
                            let sum20 = 0;
                            let hits20 = 0;
                            last20.forEach(log => {
                                const val = getStatValue(log, row['Stat Type'] || '', currentSport);
                                sum20 += val;
                                if (isMore) {
                                    if (val > line) hits20++;
                                } else {
                                    if (val < line) hits20++;
                                }
                            });
                            l20Avg = (sum20 / last20.length).toFixed(1);
                            l20Hit = ((hits20 / last20.length) * 100).toFixed(0);
                        }

                        row._l5AvgTable = l5Avg;
                        row._l5HitTable = l5Hit;
                        row._l20AvgTable = l20Avg;
                        row._l20HitTable = l20Hit;
                    });

                    // Apply sort if needed
                    let sortedFiltered = [...filtered];
                    if (store.contentSortColumn === 'Edge') {
                        sortedFiltered.sort((a, b) => {
                            const aVal = parseFloat(a['Edge %'] || 0);
                            const bVal = parseFloat(b['Edge %'] || 0);
                            return store.contentSortDirection === 'asc' ? aVal - bVal : bVal - aVal;
                        });
                    } else if (store.contentSortColumn === 'Line') {
                        sortedFiltered.sort((a, b) => {
                            const aVal = parseFloat(a['Line Score'] || a.Line || 0);
                            const bVal = parseFloat(b['Line Score'] || b.Line || 0);
                            return store.contentSortDirection === 'asc' ? aVal - bVal : bVal - aVal;
                        });
                    } else if (store.contentSortColumn === 'PPUD') {
                        sortedFiltered.sort((a, b) => {
                            const aPP = parseFloat(a['Line Score'] || a.Line || 0);
                            const aUDRaw = (a['Underdog Line'] || '').toString().trim();
                            const aUD = (aUDRaw === '' || isNaN(parseFloat(aUDRaw))) ? 0 : parseFloat(aUDRaw);

                            const bPP = parseFloat(b['Line Score'] || b.Line || 0);
                            const bUDRaw = (b['Underdog Line'] || '').toString().trim();
                            const bUD = (bUDRaw === '' || isNaN(parseFloat(bUDRaw))) ? 0 : parseFloat(bUDRaw);

                            const aVal = (aUD === 0 ? 0 : aPP - aUD);
                            const bVal = (bUD === 0 ? 0 : bPP - bUD);
                            return store.contentSortDirection === 'asc' ? aVal - bVal : bVal - aVal;
                        });
                    } else if (store.contentSortColumn === 'L5Avg') {
                        sortedFiltered.sort((a, b) => {
                            const aVal = parseFloat(a._l5AvgTable) || 0;
                            const bVal = parseFloat(b._l5AvgTable) || 0;
                            return store.contentSortDirection === 'asc' ? aVal - bVal : bVal - aVal;
                        });
                    } else if (store.contentSortColumn === 'L5Hit') {
                        sortedFiltered.sort((a, b) => {
                            const aVal = parseFloat(a._l5HitTable) || 0;
                            const bVal = parseFloat(b._l5HitTable) || 0;
                            return store.contentSortDirection === 'asc' ? aVal - bVal : bVal - aVal;
                        });
                    } else if (store.contentSortColumn === 'L20Avg') {
                        sortedFiltered.sort((a, b) => {
                            const aVal = parseFloat(a._l20AvgTable) || 0;
                            const bVal = parseFloat(b._l20AvgTable) || 0;
                            return store.contentSortDirection === 'asc' ? aVal - bVal : bVal - aVal;
                        });
                    } else if (store.contentSortColumn === 'L20Hit') {
                        sortedFiltered.sort((a, b) => {
                            const aVal = parseFloat(a._l20HitTable) || 0;
                            const bVal = parseFloat(b._l20HitTable) || 0;
                            return store.contentSortDirection === 'asc' ? aVal - bVal : bVal - aVal;
                        });
                    }

                    sortedFiltered.forEach((row, index) => {
                        const tr = document.createElement('tr');
                        tr.style.borderBottom = '1px solid #333';
                        tr.style.cursor = 'pointer';

                        // Player + sport badge
                        const tdPlayer = document.createElement('td');
                        tdPlayer.style.padding = '8px';
                        tdPlayer.innerHTML = `
                            <div style="display:flex; align-items:center; gap:8px;">
                                <img src="${row['Headshot URL'] || row['Player Image'] || 'https://via.placeholder.com/28?text=?'}" 
                                     style="width:28px;height:28px;border-radius:50%;border:1px solid #444;" alt="">
                                <div>
                                    <div style="font-weight:600;color:#00ffcc;">${row['Player Name']}</div>
                                    <div style="font-size:10px;color:#888;">${row.Team || ''} ${row.Position ? '• ' + row.Position : ''}</div>
                                </div>
                            </div>
                        `;
                        tdPlayer.onclick = () => showPlayerPopup(row, index, currentSport);
                        tr.appendChild(tdPlayer);

                        // Stat
                        const tdStat = document.createElement('td');
                        tdStat.style.padding = '8px';
                        tdStat.textContent = row['Stat Type'] || '';
                        tr.appendChild(tdStat);

                        // Edge
                        const tdEdge = document.createElement('td');
                        tdEdge.style.padding = '8px';
                        tdEdge.style.fontWeight = '700';
                        tdEdge.style.color = '#00ffcc';
                        let icon = '';
                        const ot = (row['Odds Type'] || '').toLowerCase();
                        if (ot === 'demon') icon = '👿 ';
                        if (ot === 'goblin') icon = '👺 ';
                        tdEdge.textContent = icon + (parseFloat(row['Edge %'] || 0).toFixed(1) + '%');
                        tr.appendChild(tdEdge);

                        // Line
                        const tdLine = document.createElement('td');
                        tdLine.style.padding = '8px';
                        tdLine.style.fontWeight = '600';
                        tdLine.textContent = row['Line Score'] || row.Line || '-';
                        tr.appendChild(tdLine);

                        // PP - UD (PrizePicks Line Score - Underdog Line). 0 if UD is missing/empty.
                        const tdPPUD = document.createElement('td');
                        tdPPUD.style.padding = '8px';
                        tdPPUD.style.fontWeight = '600';
                        const ppLineVal = parseFloat(row['Line Score'] || row.Line || 0);
                        const udRaw = (row['Underdog Line'] || '').toString().trim();
                        const udLineVal = (udRaw === '' || isNaN(parseFloat(udRaw))) ? 0 : parseFloat(udRaw);
                        const ppudDiff = (udLineVal === 0 ? '0.0' : (ppLineVal - udLineVal).toFixed(1));
                        tdPPUD.textContent = ppudDiff;
                        tdPPUD.style.color = parseFloat(ppudDiff) > 0 ? '#22c55e' : (parseFloat(ppudDiff) < 0 ? '#ef4444' : '#aaa');
                        tr.appendChild(tdPPUD);

                        // L5 / L20 values - calculate on the fly if pre-computed values are missing (robust for MLB + all sports)
                        let l5Avg = row._l5AvgTable || '-';
                        let l5Hit = row._l5HitTable || '-';
                        let l20Avg = row._l20AvgTable || '-';
                        let l20Hit = row._l20HitTable || '-';

                        if (l5Avg === '-' || l20Avg === '-') {
                            const normPlayer = normalizeName(row['Player Name'] || '');
                            const logs = (dataStore[currentSport]?.gameLogs || []).filter(l => 
                                normalizeName(l.PLAYER || l['Player Name'] || '') === normPlayer
                            ).sort((a, b) => new Date(b['GAME DATE'] || b.gameDate || 0) - new Date(a['GAME DATE'] || a.gameDate || 0));

                            const line = parseFloat(row['Line Score'] || row.Line || 0);
                            const betTag = (row['Bet Tag'] || '').toLowerCase();
                            const isMore = betTag.includes('more') || betTag.includes('over');

                            const last5 = logs.slice(0, 5);
                            if (last5.length > 0) {
                                let sum = 0, hits = 0;
                                last5.forEach(log => {
                                    const val = getStatValue(log, row['Stat Type'] || '', currentSport);
                                    sum += val;
                                    if (isMore ? val > line : val < line) hits++;
                                });
                                l5Avg = (sum / last5.length).toFixed(1);
                                l5Hit = ((hits / last5.length) * 100).toFixed(0);
                            }

                            const last20 = logs.slice(0, 20);
                            if (last20.length > 0) {
                                let sum = 0, hits = 0;
                                last20.forEach(log => {
                                    const val = getStatValue(log, row['Stat Type'] || '', currentSport);
                                    sum += val;
                                    if (isMore ? val > line : val < line) hits++;
                                });
                                l20Avg = (sum / last20.length).toFixed(1);
                                l20Hit = ((hits / last20.length) * 100).toFixed(0);
                            }
                        }

                        // L5 Avg
                        const tdL5 = document.createElement('td');
                        tdL5.style.padding = '8px';
                        tdL5.textContent = l5Avg;
                        tr.appendChild(tdL5);

                        // L5 Hit%
                        const tdL5Hit = document.createElement('td');
                        tdL5Hit.style.padding = '8px';
                        tdL5Hit.textContent = l5Hit !== '-' ? l5Hit + '%' : '-';
                        tr.appendChild(tdL5Hit);

                        // L20 Avg
                        const tdL20 = document.createElement('td');
                        tdL20.style.padding = '8px';
                        tdL20.textContent = l20Avg;
                        tr.appendChild(tdL20);

                        // L20 Hit%
                        const tdL20Hit = document.createElement('td');
                        tdL20Hit.style.padding = '8px';
                        tdL20Hit.textContent = l20Hit !== '-' ? l20Hit + '%' : '-';
                        tr.appendChild(tdL20Hit);

                        // Actions
                        const tdActions = document.createElement('td');
                        tdActions.style.padding = '8px';
                        const actionsDiv = document.createElement('div');
                        actionsDiv.className = 'buttons';
                        actionsDiv.style.margin = '0';
                        actionsDiv.style.background = 'transparent';

                        const key = `${row['Player Name']}-${row['Stat Type']}`;
                        const selectedBet = selectedBets.find(b => b.key === key && b.sport === currentSport);
                        let lessClass = 'button less';
                        let moreClass = 'button more';
                        if (selectedBet) {
                            if (selectedBet.choice === 'Less') lessClass += ' selected selected-less';
                            else moreClass += ' selected selected-more';
                        } else {
                            const bt = (row['Bet Tag'] || '').toLowerCase();
                            if (bt.includes('over') || bt.includes('more') || bt.includes('↑')) moreClass += ' green-outline';
                            if (bt.includes('under') || bt.includes('less') || bt.includes('↓')) lessClass += ' red-outline';
                        }

                        actionsDiv.innerHTML = `
                            <button class="${lessClass}" data-choice="Less" style="padding:6px 14px;font-size:12px;">↓ Less</button>
                            <button class="${moreClass}" data-choice="More" style="padding:6px 14px;font-size:12px;">↑ More</button>
                        `;

                        const lessBtn = actionsDiv.querySelector('.button.less');
                        const moreBtn = actionsDiv.querySelector('.button.more');

                        lessBtn.onclick = (e) => {
                            e.stopImmediatePropagation();
                            toggleBet(row, 'Less', currentSport);
                        };
                        moreBtn.onclick = (e) => {
                            e.stopImmediatePropagation();
                            toggleBet(row, 'More', currentSport);
                        };

                        tdActions.appendChild(actionsDiv);
                        tr.appendChild(tdActions);

                        tbody.appendChild(tr);
                    });

                    table.appendChild(tbody);
                    contentDiv.appendChild(table);
                }
            }, 50);
        }

        function createPlayerCard(row, index, sport) {
            const card = document.createElement('div');
            card.className = 'card';

            const edge = parseFloat(row['Edge %'] || 0).toFixed(1) + '%';
            const lineVal = row['Line Score'] || row.Line || '-';
            const statType = row['Stat Type'] || '';
            const playerName = row['Player Name'] || '';
            const team = row.Team || '';
            const gameTitle = row['Game Short Title'] || (row.Opp ? `@ ${row.Opp}` : '');
            const betTag = (row['Bet Tag'] || '').trim();
            const oddsType = (row['Odds Type'] || 'standard').toLowerCase();

            let iconHTML = '';
            if (oddsType === 'demon') iconHTML = '<div class="icon">👿</div>';
            if (oddsType === 'goblin') iconHTML = '<div class="icon">👺</div>';

            let headshotRingClass = '';
            if (sport === 'nba') headshotRingClass = 'nba';
            else if (sport === 'wnba') headshotRingClass = 'wnba';
            else if (sport === 'mlb') headshotRingClass = 'mlb';

            const key = `${playerName}-${statType}`;
            const selected = selectedBets.find(b => b.key === key && b.sport === sport);
            let lessClass = 'button less';
            let moreClass = 'button more';
            if (selected) {
                if (selected.choice === 'Less') lessClass += ' selected selected-less';
                else moreClass += ' selected selected-more';
            }

            const betTagLower = betTag.toLowerCase();
            const dividerClass = betTagLower.includes('more') || betTagLower.includes('over') ? 'more' : (betTagLower.includes('less') || betTagLower.includes('under') ? 'less' : '');

            card.innerHTML = `
                ${iconHTML}
                <div class="header">
                    <span class="pop">${edge}</span>
                </div>
                <div class="headshot-wrapper ${headshotRingClass}">
                    <img class="headshot" src="${row['Headshot URL'] || row['Player Image'] || 'https://via.placeholder.com/78?text=?'}" alt="${playerName}">
                </div>
                <div class="team">${team}</div>
                <div class="name">${playerName}</div>
                <div class="game">${gameTitle}</div>
                <div class="stat">${lineVal} ${statType}</div>
                <div class="buttons">
                    <button class="${lessClass}" data-choice="Less">↓ Less</button>
                    <div class="divider ${dividerClass}"></div>
                    <button class="${moreClass}" data-choice="More">↑ More</button>
                </div>
                <div class="info-icon" title="Player Info">ℹ️</div>
            `;

            // Button handlers
            const lessBtn = card.querySelector('.button.less');
            const moreBtn = card.querySelector('.button.more');
            const infoIcon = card.querySelector('.info-icon');

            lessBtn.onclick = (e) => {
                e.stopImmediatePropagation();
                toggleBet(row, 'Less', sport, card);
            };
            moreBtn.onclick = (e) => {
                e.stopImmediatePropagation();
                toggleBet(row, 'More', sport, card);
            };
            infoIcon.onclick = (e) => {
                e.stopImmediatePropagation();
                showPlayerPopup(row, index, sport);
            };

            return card;
        }

        function toggleBet(row, choice, sport, cardElement = null) {
            const playerName = row['Player Name'];
            const statType = row['Stat Type'];
            const key = `${playerName}-${statType}`;
            const existingIndex = selectedBets.findIndex(b => b.key === key && b.sport === sport);

            const betData = {
                key,
                player: playerName,
                choice,
                line: row['Line Score'] || row.Line,
                stat: statType,
                edge: parseFloat(row['Edge %']) || 0,
                prob: parseFloat(row['Edge %'] || 50) / 100,
                game: row['Game Short Title'] || row.Game,
                team: row.Team,
                sport: sport,
                id: row.id || '',
                projectionId: row['Data ID'] || row.id || ''
            };

            if (existingIndex > -1) {
                if (selectedBets[existingIndex].choice === choice) {
                    selectedBets.splice(existingIndex, 1);
                } else {
                    selectedBets[existingIndex] = betData;
                }
            } else {
                selectedBets.push(betData);
            }

            try { localStorage.setItem('pp_selectedBets', JSON.stringify(selectedBets)); } catch(e){}

            updateBetSlipCount();

            // Re-render current view to update button states
            if (currentSport === 'all') {
                renderAllView();
            } else {
                renderContent();
            }
        }

        function updateBetSlipCount() {
            const btn = document.getElementById('betslipBtn');
            if (btn) btn.innerHTML = `Bet Slips (${selectedBets.length})`;
        }

        // ==================== ALL VIEW ====================
        function renderAllView() {
            contentDiv.innerHTML = '';
            contentDiv.className = '';
            contentDiv.style.cssText = 'max-width: 1400px; margin: 0 auto; padding: 0 24px;';

            let allRows = [];
            ['nba', 'wnba', 'mlb'].forEach(s => {
                (dataStore[s].allData || []).forEach(row => {
                    allRows.push({ ...row, _sport: s });
                });
            });

            // Filter by selected Odds Type (Standard / Demon / Goblin)
            const selectedOddsType = (document.getElementById('oddsSelect')?.value || 'standard').toLowerCase();
            if (selectedOddsType !== 'all') {
                allRows = allRows.filter(r => {
                    const oddsType = (r['Odds Type'] || 'standard').toLowerCase();
                    return oddsType === selectedOddsType;
                });
            }

            // Simple global search
            const term = (searchInput.value || '').toLowerCase().trim();
            if (term) {
                allRows = allRows.filter(r =>
                    (r['Player Name'] || '').toLowerCase().includes(term) ||
                    (r['Stat Type'] || '').toLowerCase().includes(term)
                );
            }

            // Respect Stat Type tabs selection on "All" view (if user clicked any specific stat pills)
            if (window.allStatTypesSelected && window.allStatTypesSelected.size > 0) {
                allRows = allRows.filter(r => window.allStatTypesSelected.has((r['Stat Type'] || '').trim()));
            }

            // Sort by edge desc by default
            allRows.sort((a, b) => (parseFloat(b['Edge %'] || 0) - parseFloat(a['Edge %'] || 0)));

            if (allRows.length === 0) {
                contentDiv.innerHTML = '<div class="loading">No bets available across sports for current filters.</div>';
                return;
            }

            // Determine view mode for All tab
            const isTableView = (document.getElementById('viewSelect')?.value === 'table');

            if (isTableView) {
                // Load game logs in background for better L5/L20 data (non-blocking)
                // We render the table immediately and show "-" where logs aren't available yet
                Promise.allSettled([
                    ensureGameLogsLoaded('nba'),
                    ensureGameLogsLoaded('wnba'),
                    ensureGameLogsLoaded('mlb')
                ]).then(() => {
                    // Optional: re-render once in background if user is still on All+Table
                    // (helps if logs finish after first paint)
                    if (currentSport === 'all' && document.getElementById('viewSelect')?.value === 'table') {
                        // Only refresh if still in this exact state
                        setTimeout(() => {
                            if (currentSport === 'all' && document.getElementById('viewSelect')?.value === 'table') {
                                renderAllView();
                            }
                        }, 800);
                    }
                });

                // Render Table View for All tab immediately (don't block on logs)
                contentDiv.classList.add('table-view');
                const table = document.createElement('table');
                const thead = document.createElement('thead');

                };
                popupTabs.appendChild(t);

            // Initial content
            renderPopupContent('Overview', row, sport);

            // Nav
            document.getElementById('prevPlayer').onclick = () => navigatePopup(-1);
            document.getElementById('nextPlayer').onclick = () => navigatePopup(1);
            // Close button - use addEventListener for reliability
            const closeBtn = document.getElementById('closePlayerPopup');
            if (closeBtn) {
                closeBtn.onclick = null; // clear any previous
                closeBtn.onclick = () => {
                    popup.style.display = 'none';
                    overlay.style.display = 'none';
                    if (currentChart) { currentChart.destroy(); currentChart = null; }
                };
            }

            // === Mobile Swipe Navigation (left/right between players) ===
            // Only enhance on touch devices; desktop behavior unchanged
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                let touchStartX = 0;
                let touchStartY = 0;

                const handleTouchStart = (e) => {
                    touchStartX = e.changedTouches[0].screenX;
                    touchStartY = e.changedTouches[0].screenY;
                };

                const handleTouchEnd = (e) => {
                    const touchEndX = e.changedTouches[0].screenX;
                    const touchEndY = e.changedTouches[0].screenY;

                    const diffX = touchStartX - touchEndX;
                    const diffY = touchStartY - touchEndY;

                    // Only trigger on horizontal swipe (ignore mostly vertical scrolls)
                    if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 60) {
                        if (diffX > 0) {
                            // Swipe left → Next player
                            if (currentRowIndex < currentFiltered.length - 1) {
                                showPlayerPopup(currentFiltered[currentRowIndex + 1], currentRowIndex + 1, currentPopupSport);

                            if (currentRowIndex > 0) {
                                showPlayerPopup(currentFiltered[currentRowIndex - 1], currentRowIndex - 1, currentPopupSport);
                            }
                        }
                    }
                };

                popup.addEventListener('touchstart', handleTouchStart, { passive: true });
                popup.addEventListener('touchend', handleTouchEnd, { passive: true });
            }
        }

        function updateGameLogAverages(table) {
            if (!table) return;
            const tbody = table.querySelector('tbody');
            if (!tbody) return;

            const visibleRows = Array.from(tbody.rows).filter(r => r.style.display !== 'none' && !r.classList.contains('averages-row'));
            if (visibleRows.length === 0) return;

            const headers = Array.from(table.querySelectorAll('thead th')).map(th => th.textContent.trim());
            const avgRow = tbody.querySelector('.averages-row') || tbody.rows[tbody.rows.length - 1];

            if (!avgRow) return;

            headers.forEach((header, colIndex) => {
                const cell = avgRow.cells[colIndex];
                if (!cell) return;

                if (['MATCH UP', 'GAME DATE', 'W/L', 'FG', '3PM/A', 'FT', 'Summary'].includes(header)) {
                    if (header === 'MATCH UP') cell.textContent = 'Filtered Avg';
                    else cell.textContent = '-';
                    return;
                }

                let sum = 0;
                let count = 0;

                visibleRows.forEach(row => {
                    const val = parseFloat(row.cells[colIndex]?.textContent);
                    if (!isNaN(val)) {
                        sum += val;
                        count++;
                    }
                });

                cell.textContent = count > 0 ? (sum / count).toFixed(1) : '-';
            });
        }

            showPlayerPopup(currentFiltered[newIndex], newIndex, currentSport);
        }

        function generateCombinations(bets) {
            let allCombinations = { 2: [], 3: [], 4: [], 5: [], 6: [] };
            const betCount = bets.length;
            if (betCount < 2) return allCombinations;

            for (let pickcount = 2; pickcount <= Math.min(6, betCount); pickcount++) {
                const combos = (predefinedCombinations[pickcount] || []).filter(combo => combo.every(id => id <= betCount)).map(combo => combo.map(id => id - 1));
                combos.forEach(combo => {
                    let valid = true;
                    let players = new Set();
                    let productProb = 1;
                    let comboPlayers = [];
                    let playerdetails = [];
                    let projectionEntries = [];
                    let games = new Set();
                    for (let idx of combo) {
                        const bet = bets[idx];
                        if (!bet) { valid = false; break; }
                        const player = bet.player || 'Unknown';
                        const prob = parseFloat(bet.prob) || 0.5;
                        const direction = (bet.choice || 'More').toLowerCase() === 'more' ? 'o' : 'u';
                        const line = bet.line || '0';
                        if (prob <= 0 || prob >= 1) { valid = false; break; }
                        if (players.has(player)) { valid = false; break; }
                        players.add(player);
                        productProb *= prob;
                        comboPlayers.push(player);
                        playerdetails.push(bet);
                        projectionEntries.push(`${bet.id || ''},${bet.projectionId || ''}-${direction}-${line}`);
                        games.add(bet.game || 'Mixed');
                    }
                    if (valid) {
                        let cashLikelihood = productProb * 100;
                        let breakEven = pickcount === 2 ? 0.33 : pickcount === 3 ? 0.1667 : pickcount === 4 ? 0.10 : pickcount === 5 ? 0.10 : 0.04;
                        let edge = (productProb - breakEven) * 100;
                        let payout = pickcount === 2 ? '3X' : pickcount === 3 ? '6X' : pickcount === 4 ? '10X' : pickcount === 5 ? '10X' : '25X';
                        let gameLabel = games.size === 1 ? Array.from(games)[0] : 'Mixed';
                        allCombinations[pickcount].push({
                            sliplink: `https://prizepicks.onelink.me/gCQS/shareEntry?projections=${projectionEntries.join(',')}`,
                            players: comboPlayers.join(' | '),
                            playerdetails,
                            edge: edge,
                            payout,
                            pickcount,
                            cashlikelihood: cashLikelihood,
                            game: gameLabel
                        });
                    }
                });
            }
            return allCombinations;
        }

        function renderBetSlipsTable() {
            const tbody = document.getElementById('betslipsBody');
            const headerRow = document.getElementById('betslipsHeader');
            tbody.innerHTML = '';
            headerRow.innerHTML = '';

            if (selectedBets.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="padding:20px;color:#888;">No bets selected yet. Click More/Less on any player card.</td></tr>`;
                return;
            }

            if (selectedBets.length < 2) {
                tbody.innerHTML = `<tr><td colspan="7" style="padding:20px;color:#ffcc00;">Select at least 2 bets to generate combinations.</td></tr>`;
                return;
            }

            if (selectedBets.length > 12) {
                tbody.innerHTML = `<tr><td colspan="7" style="padding:20px;color:#ffcc00;">Too many bets selected. Please reduce to 10 or fewer for best performance.</td></tr>`;
                return;
            }

            const combinations = generateCombinations(selectedBets);
            let outputData = [];
            for (let pickcount = 2; pickcount <= 6; pickcount++) {
                outputData.push(...(combinations[pickcount] || []));
            }

            const payoutFilterEl = document.getElementById('payoutFilter');
            if (payoutFilterEl) {
                payoutFilterEl.onchange = () => renderBetSlipsTable();
            }
            const selectedPayout = payoutFilterEl ? payoutFilterEl.value : 'all';
            if (selectedPayout !== 'all') {
                outputData = outputData.filter(combo => combo.payout === selectedPayout);
            }

            if (outputData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="padding:20px;color:#ffcc00;">No combinations match the current payout filter, or could not generate valid combinations.</td></tr>`;
                return;
            }

            const headers = ['Slip Link', 'Players', 'Edge', 'Cash Likelihood', 'Payout'];
            headers.forEach(col => {
                const th = document.createElement('th');
                th.textContent = col;
                headerRow.appendChild(th);
            });

            outputData.sort((a, b) => (b.edge || 0) - (a.edge || 0));

            outputData.forEach((combo) => {
                const tr = document.createElement('tr');
                tr.style.cursor = 'pointer';

                const tdLink = document.createElement('td');
                const a = document.createElement('a');
                a.href = combo.sliplink;
                a.textContent = 'Place Bet';
                a.target = '_blank';
                a.style.color = '#22c55e';
                a.style.fontWeight = '700';
                a.onclick = e => e.stopImmediatePropagation();
                tdLink.appendChild(a);
                tr.appendChild(tdLink);

                const tdPlayers = document.createElement('td');
                tdPlayers.style.cursor = 'pointer';
                tdPlayers.innerHTML = `<strong>${combo.players}</strong> <span style="font-size:10px;color:#888;">(click for details)</span>`;

                const detailRowId = 'detail-' + combo.players.replace(/\s+/g, '');
                tdPlayers.onclick = (e) => {
                    e.stopImmediatePropagation();
                    const existingDetail = document.getElementById(detailRowId);
                    if (existingDetail) {
                        existingDetail.remove();
                    } else {
                        const detailTr = document.createElement('tr');
                        detailTr.id = detailRowId;
                        const detailTd = document.createElement('td');
                        detailTd.colSpan = 5;
                        detailTd.style.background = '#111';
                        detailTd.style.padding = '10px';
                        detailTd.innerHTML = combo.playerdetails.map(d => 
                            `<div style="margin-bottom:6px; padding:6px; background:#1f1f1f; border-radius:6px;">
                                <strong>${d.player}</strong> — ${d.choice} ${d.line} ${d.stat} 
                                <span style="color:#00ffcc;">(Edge: ${d.edge.toFixed(1)}%)</span>
                            </div>`
                        ).join('');
                        detailTr.appendChild(detailTd);
                        tr.parentNode.insertBefore(detailTr, tr.nextSibling);
                    }
                };
                tr.appendChild(tdPlayers);

                const tdEdge = document.createElement('td');
                tdEdge.style.color = '#00ffcc';
                tdEdge.style.fontWeight = '700';
                tdEdge.textContent = (combo.edge || 0).toFixed(1) + '%';
                tr.appendChild(tdEdge);

                const tdCash = document.createElement('td');
                tdCash.textContent = (combo.cashlikelihood || 0).toFixed(1) + '%';
                tr.appendChild(tdCash);

                const tdPayout = document.createElement('td');
                tdPayout.innerHTML = `<span style="background:#333;padding:2px 8px;border-radius:9999px;font-size:12px;">${combo.payout}</span>`;
                tr.appendChild(tdPayout);

                tbody.appendChild(tr);
            });

            document.getElementById('betSlipCount').textContent = `(${selectedBets.length} legs • ${outputData.length} combos)`;
        }

            if (currentSport === 'all') renderAllView(); else renderContent();
        }

        function placeBetOnPrizePicks() {
            if (selectedBets.length === 0) {
                alert('No bets selected!');
                return;
            }

            let betText = `PrizePicks Bet Slip (${selectedBets.length} legs):\n\n`;
            
            selectedBets.forEach((bet, i) => {
                betText += `${i + 1}. ${bet.player} - ${bet.stat} ${bet.choice} ${bet.line}  |  Edge: ${bet.edge.toFixed(1)}%\n`;
            });

            betText += `\nCopy these legs into PrizePicks. Good luck!`;

            navigator.clipboard.writeText(betText).then(() => {
                window.open('https://prizepicks.com/', '_blank');
                alert(`Bet slip copied to clipboard!\n\n${betText}\n\nPrizePicks has been opened in a new tab. Paste the legs there.`);
            }).catch(() => {
                prompt('Copy this bet slip:', betText);
                window.open('https://prizepicks.com/', '_blank');
            });
        }

        function filterBetSlips() {
            renderBetSlipsTable();
        }

        // ==================== MISC ====================
        function showToolInfo() {
            const popup = document.createElement('div');
            popup.className = 'popup';
            popup.style.display = 'block';
            popup.innerHTML = `
                <button onclick="this.parentNode.remove();document.getElementById('overlay').style.display='none';" style="float:right;background:#333;color:#fff;border:none;padding:4px 12px;border-radius:9999px;">Close</button>
                <h3>How to use the Multi-Sport Optimizer</h3>
                <ul style="line-height:1.6;font-size:14px;">
                    <li>Switch between <strong>NBA • WNBA • MLB • All</strong> using the top tabs.</li>
                    <li>Each sport works independently with its own filters and stat tabs.</li>
                    <li>Click <strong>More</strong> or <strong>Less</strong> on any card — bets from ALL sports go into one shared Bet Slip.</li>
                    <li>Use the Bet Slips button (top right) to review your selections and generate parlay combinations.</li>
                    <li>Click the ℹ️ icon on any card for deep player stats, game logs, splits & charts.</li>
                    <li><strong>MLB Splits tab</strong> now uses enhanced hit rate (L5/L10/L20) + visual chart (green/red bars).</li>
                    <li><strong>MLB only:</strong> Game O/U and Point Spread are color-coded in player popups (green/yellow/red).</li>
                </ul>
                <p style="font-size:12px;color:#888;margin-top:16px;">Data loaded from your local CSVs. Game logs enhance the popup but are optional.</p>
            `;
            document.body.appendChild(popup);
            document.getElementById('overlay').style.display = 'block';
        }

        // ==================== INIT ====================
        window.onload = () => {
            loadAllData();

            document.addEventListener('keydown', (e) => {
                if (e.key === '/' && document.activeElement.tagName === 'BODY') {
                    e.preventDefault();
                    searchInput.focus();
                    searchInput.select();
                }
                if (e.key === 'Escape') {
                    document.querySelectorAll('.popup, #playerPopup').forEach(p => p.style.display = 'none');
                    document.getElementById('overlay').style.display = 'none';
                }
            });

            document.getElementById('overlay').onclick = () => {
                document.querySelectorAll('.popup, #playerPopup').forEach(p => p.style.display = 'none');
                document.getElementById('overlay').style.display = 'none';
            };
        };

        window.PP_DEBUG = { dataStore, selectedBets, currentSport };
    </script>
</body>
</html>
